<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kartu Ucapan Ultah - Dengan Tombol Suara</title>
  <style>
    /* style minimal untuk contoh */
    body {
      background: linear-gradient(145deg, #fce4d6, #ffe6f0);
      font-family: 'Quicksand', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 40px;
      padding: 30px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 30px rgba(0,0,0,0.2);
    }
    .clickable-media {
      margin: 20px auto;
      cursor: pointer;
      transition: transform 0.2s;
      display: inline-block;
    }
    .clickable-media:active {
      transform: scale(0.97);
    }
    img, video {
      width: 100%;
      max-width: 300px;
      border-radius: 30px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
      border: 3px solid #ffb347;
    }
    button {
      background: #ff7e5e;
      border: none;
      padding: 12px 25px;
      border-radius: 50px;
      color: white;
      font-weight: bold;
      margin-top: 15px;
      cursor: pointer;
    }
    .info {
      margin-top: 20px;
      font-size: 14px;
      color: #a5571e;
    }
  </style>
</head>
<body>
<div class="card">
  <h2>🎂 Selamat Ulang Tahun! 🎉</h2>
  <p>Klik gambar atau video di bawah ini untuk mendengar ucapan spesial!</p>

  <!-- Area gambar/video yang bisa diklik dan bersuara -->
  <div class="clickable-media" id="soundTrigger">
    <!-- GAMBAR: bisa ganti dengan video jika punya file video -->
    <img src="https://cdn-icons-png.flaticon.com/512/3176/3176366.png" alt="Kue Ultah" id="clickableImg">
    <!-- Jika ingin pakai video dari TikTok, simpan videonya dulu lalu ganti src di bawah -->
    <!-- <video id="clickableVideo" width="300" controls>
      <source src="video_ultah.mp4" type="video/mp4">
    </video> -->
  </div>

  <button id="playSoundBtn">🔊 Klik untuk dengar suara</button>
  <div class="info">✨ Suara "Happy Birthday" singkat akan diputar ✨</div>
</div>

<script>
  // Fungsi membuat bunyi (menggunakan Web Audio API atau Audio context)
  function playBirthdaySound() {
    // Cara 1: Memutar file suara online (pastikan file .mp3 tersedia)
    // Ganti URL berikut dengan file suara "happy birthday" pilihan Anda.
    const audio = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3');
    // Atau pakai file suara pendek happy birthday dari link yang valid.
    // Karena tidak ada file suara spesifik, kita buat suara "beep" + synth bass sederhana.
    
    // Alternatif: menggunakan Web Audio API untuk membuat nada bahagia
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const ctx = new AudioContext();
      const now = ctx.currentTime;
      
      // Nada: C - D - E - C (do re mi do)
      const freqs = [261.63, 293.66, 329.63, 261.63];
      const durations = [0.4, 0.4, 0.4, 0.8];
      
      freqs.forEach((freq, idx) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        gain.gain.value = 0.3;
        osc.start(now + idx * 0.5);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + idx * 0.5 + durations[idx]);
        osc.stop(now + idx * 0.5 + durations[idx]);
      });
      
      // Irama tambahan (do re mi fa sol)
      setTimeout(() => {
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.frequency.value = 392.00; // G
        gain2.gain.value = 0.2;
        osc2.start();
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 2.2);
        osc2.stop(now + 2.2);
      }, 1800);
      
    } catch(e) {
      console.log("Web Audio tidak didukung, fallback ke beep");
      // Fallback sederhana
      const beep = new Audio();
      beep.src = "data:audio/wav;base64,U3RlYWx0aCB... (tidak praktis)";
      alert("🔊 Selamat Ulang Tahun! (Suara tidak bisa diputar, tapi semangat tetap ada!)");
    }
  }
  
  // Event klik pada gambar/video
  const triggerArea = document.getElementById('soundTrigger');
  triggerArea.addEventListener('click', () => {
    playBirthdaySound();
    // Efek animasi visual
    const img = document.getElementById('clickableImg');
    img.style.transform = 'scale(0.95)';
    setTimeout(() => img.style.transform = '', 200);
  });
  
  // Tombol kedua juga memainkan suara
  document.getElementById('playSoundBtn').addEventListener('click', playBirthdaySound);
  
  // Catatan: Jika Anda ingin menggunakan video TikTok yang sudah di-download, 
  // ganti tag <img> dengan <video> dan tambahkan autoplay? Tidak disarankan autoplay suara.
  // Untuk video, Anda bisa atur controls dan tetap bisa klik area untuk memutar suara terpisah.
</script>
</body>
</html>
